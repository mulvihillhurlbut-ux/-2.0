[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "zisi"

# 验证接口 → Netlify Function
[[redirects]]
  from = "/.netlify/functions/verify-key"
  to = "/.netlify/functions/verify-key"
  status = 200

# 管理接口
[[redirects]]
  from = "/.netlify/functions/admin-keys"
  to = "/.netlify/functions/admin-keys"
  status = 200